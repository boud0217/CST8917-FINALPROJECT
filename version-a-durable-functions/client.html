<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Approval — Version A (Durable Functions)</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --info: #3b82f6;
            --border: #475569;
            --radius: 10px;
        }

        .light-theme {
            --bg-primary: #f8fafc;
            --bg-secondary: #e2e8f0;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #cbd5e1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 24px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        header h1 { font-size: 1.8rem; font-weight: 700; }
        header h1 span { color: var(--accent); }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.85rem;
        }

        .config-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
        }

        .config-panel summary {
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .config-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .config-grid label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
            display: block;
        }

        .config-grid input {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.85rem;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
        }

        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
        }

        .card h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.8rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 16px;
        }

        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group.full-width { grid-column: 1 / -1; }

        .form-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-group input, .form-group select, .form-group textarea {
            padding: 9px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.85rem;
            font-family: inherit;
        }

        .form-group textarea { resize: vertical; min-height: 70px; }

        .form-group select option { background: var(--bg-primary); }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover { background: var(--accent-hover); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-success { background: #16a34a; }
        .btn-success:hover { background: #15803d; }
        .btn-danger { background: var(--error); }
        .btn-danger:hover { background: #dc2626; }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        .btn-secondary:hover { background: var(--bg-card); color: var(--text-primary); }

        .btn-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

        .result-box {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 14px;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 0.78rem;
            white-space: pre-wrap;
            word-break: break-all;
            min-height: 60px;
            color: var(--text-secondary);
            margin-top: 14px;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-approved { background: rgba(34, 197, 94, 0.15); color: var(--success); }
        .badge-rejected { background: rgba(239, 68, 68, 0.15); color: var(--error); }
        .badge-escalated { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
        .badge-pending { background: rgba(59, 130, 246, 0.15); color: var(--info); }

        .instance-row {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .instance-id {
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .instance-meta { font-size: 0.8rem; color: var(--text-secondary); }

        .activity-log {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-top: 20px;
            max-height: 180px;
            overflow-y: auto;
        }

        .activity-log h4 {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .log-entry {
            font-size: 0.78rem;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            color: var(--text-secondary);
            padding: 3px 0;
            border-bottom: 1px solid rgba(71, 85, 105, 0.3);
        }

        .log-entry .time { color: var(--accent); margin-right: 8px; }
        .log-entry.success .msg { color: var(--success); }
        .log-entry.error .msg { color: var(--error); }
        .log-entry.info .msg { color: var(--info); }
        .log-entry.warning .msg { color: var(--warning); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span>Expense Approval</span> — Version A</h1>
            <button class="theme-toggle" onclick="toggleTheme()">Toggle Theme</button>
        </header>

        <details class="config-panel" open>
            <summary>Azure Configuration</summary>
            <div class="config-grid">
                <div>
                    <label>Function App URL</label>
                    <input type="text" id="funcUrl" placeholder="https://func-expense-approval-a-xxx.azurewebsites.net/api" value="https://func-expense-approval-a-fyduepe7ccb9hyhp.canadacentral-01.azurewebsites.net/api">
                </div>
            </div>
        </details>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('employee')">Employee</button>
            <button class="tab-btn" onclick="switchTab('manager')">Manager</button>
        </div>

        <!-- ── EMPLOYEE TAB ── -->
        <div id="tab-employee" class="tab-content active">

            <div class="card">
                <h3>Submit Expense Request</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Employee Name</label>
                        <input type="text" id="emp-name" placeholder="Alice Smith">
                    </div>
                    <div class="form-group">
                        <label>Employee Email</label>
                        <input type="email" id="emp-email" placeholder="alice@example.com">
                    </div>
                    <div class="form-group">
                        <label>Amount ($)</label>
                        <input type="number" id="emp-amount" placeholder="150.00" step="0.01" min="0">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="emp-category">
                            <option value="">— Select category —</option>
                            <option value="travel">Travel</option>
                            <option value="meals">Meals</option>
                            <option value="supplies">Supplies</option>
                            <option value="equipment">Equipment</option>
                            <option value="software">Software</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label>Description</label>
                        <textarea id="emp-description" placeholder="Brief description of the expense..."></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label>Manager Email</label>
                        <input type="email" id="emp-manager-email" placeholder="manager@example.com">
                    </div>
                </div>
                <div class="btn-row">
                    <button class="btn" onclick="submitExpense()">Submit Expense</button>
                    <button class="btn btn-secondary" onclick="fillTestData('valid-low')">Fill: Under $100</button>
                    <button class="btn btn-secondary" onclick="fillTestData('valid-high')">Fill: Over $100</button>
                    <button class="btn btn-secondary" onclick="fillTestData('missing-fields')">Fill: Missing Fields</button>
                    <button class="btn btn-secondary" onclick="fillTestData('invalid-category')">Fill: Invalid Category</button>
                </div>
                <div class="result-box" id="submit-result">Response will appear here...</div>
            </div>

            <div class="card">
                <h3>Check Expense Status</h3>
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>Instance ID</label>
                        <input type="text" id="status-instance-id" placeholder="Paste instanceId from submission response">
                    </div>
                </div>
                <div class="btn-row">
                    <button class="btn btn-secondary" onclick="checkStatus()">Check Status</button>
                </div>
                <div class="result-box" id="status-result">Response will appear here...</div>
            </div>

        </div>

        <!-- ── MANAGER TAB ── -->
        <div id="tab-manager" class="tab-content">

            <div class="card">
                <h3>Pending Approvals</h3>
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>Instance ID</label>
                        <input type="text" id="mgr-instance-id" placeholder="Paste instanceId from employee submission">
                    </div>
                    <div class="form-group full-width">
                        <label>Reason (optional)</label>
                        <input type="text" id="mgr-reason" placeholder="e.g. Approved for Q2 budget / Over budget limit">
                    </div>
                </div>
                <div class="btn-row">
                    <button class="btn btn-success" onclick="sendDecision(true)">Approve</button>
                    <button class="btn btn-danger" onclick="sendDecision(false)">Reject</button>
                </div>
                <div class="result-box" id="decision-result">Response will appear here...</div>
            </div>

            <div class="card">
                <h3>Check Decision Status</h3>
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>Instance ID</label>
                        <input type="text" id="mgr-status-instance-id" placeholder="Paste instanceId to verify outcome">
                    </div>
                </div>
                <div class="btn-row">
                    <button class="btn btn-secondary" onclick="checkManagerStatus()">Check Status</button>
                </div>
                <div class="result-box" id="mgr-status-result">Response will appear here...</div>
            </div>

        </div>

        <div class="activity-log">
            <h4>Activity Log</h4>
            <div id="activityLog"></div>
        </div>
    </div>

    <script>
        function getUrl() {
            let url = document.getElementById('funcUrl').value.trim();
            return url.endsWith('/') ? url.slice(0, -1) : url;
        }

        function log(message, level = 'info') {
            const logDiv = document.getElementById('activityLog');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry ${level}`;
            entry.innerHTML = `<span class="time">[${time}]</span><span class="msg">${message}</span>`;
            logDiv.prepend(entry);
        }

        function toggleTheme() { document.body.classList.toggle('light-theme'); }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tabName}')"]`).classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        function fillTestData(scenario) {
            const fields = {
                'valid-low': {
                    name: 'Alice Smith', email: 'alice@example.com', amount: 45,
                    category: 'meals', description: 'Team lunch', manager: 'manager@example.com'
                },
                'valid-high': {
                    name: 'Bob Jones', email: 'bob@example.com', amount: 350,
                    category: 'travel', description: 'Flight to Toronto', manager: 'manager@example.com'
                },
                'missing-fields': {
                    name: 'Eve Davis', email: '', amount: 150,
                    category: 'supplies', description: '', manager: ''
                },
                'invalid-category': {
                    name: 'Frank Lee', email: 'frank@example.com', amount: 75,
                    category: '', description: 'Client dinner', manager: 'manager@example.com'
                }
            };

            const d = fields[scenario];
            document.getElementById('emp-name').value = d.name;
            document.getElementById('emp-email').value = d.email;
            document.getElementById('emp-amount').value = d.amount;
            document.getElementById('emp-category').value = d.category;
            document.getElementById('emp-description').value = d.description;
            document.getElementById('emp-manager-email').value = d.manager;

            if (scenario === 'invalid-category') {
                document.getElementById('emp-category').value = '';
                document.getElementById('emp-category').insertAdjacentHTML('beforeend', '<option value="entertainment" selected>Entertainment (invalid)</option>');
                document.getElementById('emp-category').value = 'entertainment';
            }
        }

        async function submitExpense() {
            const body = {
                employeeName: document.getElementById('emp-name').value,
                employeeEmail: document.getElementById('emp-email').value,
                amount: parseFloat(document.getElementById('emp-amount').value),
                category: document.getElementById('emp-category').value,
                description: document.getElementById('emp-description').value,
                managerEmail: document.getElementById('emp-manager-email').value,
            };

            log(`Submitting expense for ${body.employeeName} — $${body.amount}`, 'info');
            const resultBox = document.getElementById('submit-result');
            resultBox.textContent = 'Submitting...';

            try {
                const res = await fetch(`${getUrl()}/expenses`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                resultBox.textContent = JSON.stringify(data, null, 2);

                if (data.instanceId) {
                    document.getElementById('status-instance-id').value = data.instanceId;
                    document.getElementById('mgr-instance-id').value = data.instanceId;
                    document.getElementById('mgr-status-instance-id').value = data.instanceId;
                    log(`Orchestration started: ${data.instanceId}`, 'success');
                }
                if (data.output) {
                    log(`Result: ${data.output.status} — ${data.output.reason}`, data.output.status === 'approved' ? 'success' : 'warning');
                }
            } catch (err) {
                resultBox.textContent = `Error: ${err.message}`;
                log(`Submit failed: ${err.message}`, 'error');
            }
        }

        async function checkStatus() {
            const instanceId = document.getElementById('status-instance-id').value.trim();
            if (!instanceId) { log('Please enter an instance ID', 'error'); return; }

            const resultBox = document.getElementById('status-result');
            resultBox.textContent = 'Checking...';
            log(`Checking status for ${instanceId}`, 'info');

            try {
                const res = await fetch(`${getUrl()}/expenses/${instanceId}/status`);
                const data = await res.json();
                resultBox.textContent = JSON.stringify(data, null, 2);
                log(`Status: ${data.runtimeStatus}`, 'info');
            } catch (err) {
                resultBox.textContent = `Error: ${err.message}`;
                log(`Status check failed: ${err.message}`, 'error');
            }
        }

        async function sendDecision(approved) {
            const instanceId = document.getElementById('mgr-instance-id').value.trim();
            const reason = document.getElementById('mgr-reason').value.trim();

            if (!instanceId) { log('Please enter an instance ID', 'error'); return; }

            const resultBox = document.getElementById('decision-result');
            resultBox.textContent = 'Sending decision...';
            log(`Sending decision: ${approved ? 'APPROVE' : 'REJECT'} for ${instanceId}`, approved ? 'success' : 'warning');

            try {
                const res = await fetch(`${getUrl()}/expenses/${instanceId}/decision`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ approved, reason: reason || (approved ? 'Manager approved' : 'Manager rejected') })
                });
                const data = await res.json();
                resultBox.textContent = JSON.stringify(data, null, 2);
                log(`Decision sent successfully`, 'success');
            } catch (err) {
                resultBox.textContent = `Error: ${err.message}`;
                log(`Decision failed: ${err.message}`, 'error');
            }
        }

        async function checkManagerStatus() {
            const instanceId = document.getElementById('mgr-status-instance-id').value.trim();
            if (!instanceId) { log('Please enter an instance ID', 'error'); return; }

            const resultBox = document.getElementById('mgr-status-result');
            resultBox.textContent = 'Checking...';

            try {
                const res = await fetch(`${getUrl()}/expenses/${instanceId}/status`);
                const data = await res.json();
                resultBox.textContent = JSON.stringify(data, null, 2);
                log(`Final status: ${data.runtimeStatus} — ${data.output?.status || ''}`, 'info');
            } catch (err) {
                resultBox.textContent = `Error: ${err.message}`;
                log(`Status check failed: ${err.message}`, 'error');
            }
        }

        log('Version A client ready.', 'info');
    </script>
</body>
</html>
